<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>2048</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #222;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        h1 {
            margin-top: 30px;
        }
        #grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            grid-template-rows: repeat(4, 80px);
            gap: 8px;
            margin: 30px auto;
            width: 352px;
            background: #bbada0;
            padding: 8px;
            border-radius: 10px;
        }
        .cell {
            width: 80px;
            height: 80px;
            background: #ccc0b3;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: bold;
            color: #776e65;
            transition: background 0.2s;
        }
        .cell[data-value="2"]    { background: #eee4da; }
        .cell[data-value="4"]    { background: #ede0c8; }
        .cell[data-value="8"]    { background: #f2b179; color: #fff; }
        .cell[data-value="16"]   { background: #f59563; color: #fff; }
        .cell[data-value="32"]   { background: #f67c5f; color: #fff; }
        .cell[data-value="64"]   { background: #f65e3b; color: #fff; }
        .cell[data-value="128"]  { background: #edcf72; color: #fff; }
        .cell[data-value="256"]  { background: #edcc61; color: #fff; }
        .cell[data-value="512"]  { background: #edc850; color: #fff; }
        .cell[data-value="1024"] { background: #edc53f; color: #fff; }
        .cell[data-value="2048"] { background: #edc22e; color: #fff; }
        #score {
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        #restart {
            margin-top: 10px;
            padding: 8px 20px;
            font-size: 1em;
            border: none;
            border-radius: 5px;
            background: #8f7a66;
            color: #fff;
            cursor: pointer;
        }
        #restart:hover {
            background: #a39489;
        }
    </style>
</head>
<body>
    <h1>2048</h1>
    <div id="score">分数: 0</div>
    <div id="grid"></div>
    <button id="restart">重新开始</button>
    <script>
        const gridSize = 4;
        let grid = [];
        let score = 0;

        function initGrid() {
            grid = [];
            for (let i = 0; i < gridSize; i++) {
                grid[i] = [];
                for (let j = 0; j < gridSize; j++) {
                    grid[i][j] = 0;
                }
            }
            score = 0;
            addRandom();
            addRandom();
            updateGrid();
            updateScore();
        }

        function addRandom() {
            let empty = [];
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    if (grid[i][j] === 0) empty.push([i, j]);
                }
            }
            if (empty.length === 0) return;
            let [i, j] = empty[Math.floor(Math.random() * empty.length)];
            grid[i][j] = Math.random() < 0.9 ? 2 : 4;
        }

        function updateGrid() {
            const gridDiv = document.getElementById('grid');
            gridDiv.innerHTML = '';
            for (let i = 0; i < gridSize; i++) {
                for (let j = 0; j < gridSize; j++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    if (grid[i][j] !== 0) {
                        cell.textContent = grid[i][j];
                        cell.setAttribute('data-value', grid[i][j]);
                    }
                    gridDiv.appendChild(cell);
                }
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = '分数: ' + score;
        }

        function move(dir) {
            let moved = false;
            let merged = Array.from({length: gridSize}, () => Array(gridSize).fill(false));
            let addScore = 0;

            function moveCell(i, j, di, dj) {
                if (grid[i][j] === 0) return false;
                let ni = i, nj = j;
                while (true) {
                    let ti = ni + di, tj = nj + dj;
                    if (ti < 0 || ti >= gridSize || tj < 0 || tj >= gridSize) break;
                    if (grid[ti][tj] === 0) {
                        grid[ti][tj] = grid[ni][nj];
                        grid[ni][nj] = 0;
                        ni = ti; nj = tj;
                        moved = true;
                    } else if (grid[ti][tj] === grid[ni][nj] && !merged[ti][tj]) {
                        grid[ti][tj] *= 2;
                        addScore += grid[ti][tj];
                        grid[ni][nj] = 0;
                        merged[ti][tj] = true;
                        moved = true;
                        break;
                    } else {
                        break;
                    }
                }
            }

            if (dir === 'left') {
                for (let i = 0; i < gridSize; i++)
                    for (let j = 1; j < gridSize; j++)
                        moveCell(i, j, 0, -1);
            } else if (dir === 'right') {
                for (let i = 0; i < gridSize; i++)
                    for (let j = gridSize - 2; j >= 0; j--)
                        moveCell(i, j, 0, 1);
            } else if (dir === 'up') {
                for (let j = 0; j < gridSize; j++)
                    for (let i = 1; i < gridSize; i++)
                        moveCell(i, j, -1, 0);
            } else if (dir === 'down') {
                for (let j = 0; j < gridSize; j++)
                    for (let i = gridSize - 2; i >= 0; i--)
                        moveCell(i, j, 1, 0);
            }

            if (moved) {
                score += addScore;
                addRandom();
                updateGrid();
                updateScore();
                if (isGameOver()) {
                    setTimeout(() => alert('游戏结束！'), 100);
                }
                if (isWin()) {
                    setTimeout(() => alert('你赢了！'), 100);
                }
            }
        }

        function isGameOver() {
            for (let i = 0; i < gridSize; i++)
                for (let j = 0; j < gridSize; j++)
                    if (grid[i][j] === 0) return false;
            for (let i = 0; i < gridSize; i++)
                for (let j = 0; j < gridSize - 1; j++)
                    if (grid[i][j] === grid[i][j + 1]) return false;
            for (let j = 0; j < gridSize; j++)
                for (let i = 0; i < gridSize - 1; i++)
                    if (grid[i][j] === grid[i + 1][j]) return false;
            return true;
        }

        function isWin() {
            for (let i = 0; i < gridSize; i++)
                for (let j = 0; j < gridSize; j++)
                    if (grid[i][j] === 2048) return true;
            return false;
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') move('left');
            else if (e.key === 'ArrowRight') move('right');
            else if (e.key === 'ArrowUp') move('up');
            else if (e.key === 'ArrowDown') move('down');
        });

        document.getElementById('restart').onclick = initGrid;
        // 初始化
        initGrid();
    </script>
    <button style="margin-top: 50px;" onclick="location.href='index.html'">返回首页</button>
</body>
</html>
