<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>情绪翻翻乐</title>
    <style>
        body { background: #f0f9ff; text-align: center; font-family: sans-serif; }
        .grid { display: grid; grid-template-columns: repeat(4, 120px); gap: 15px; justify-content: center; margin-top: 50px; }
        .card { width: 120px; height: 120px; background: #3498db; border-radius: 15px; cursor: pointer; 
                display: flex; align-items: center; justify-content: center; font-size: 50px; color: transparent; transition: 0.3s; }
        .card.flipped { background: white; color: initial; transform: rotateY(180deg); }
        .card.matched { background: #2ecc71; color: white; cursor: default; }
        .back-btn { margin-top: 30px; padding: 10px 20px; cursor: pointer; border-radius: 20px; border: none; background: #333; color: white; }
    </style>
</head>
<body>
    <h1>😊 情绪对对碰</h1>
    <p>找出一对相同的表情吧！</p>
    <div class="grid" id="grid"></div>
    <button class="back-btn" onclick="location.href='index.html'">返回首页</button>

    <script>
        const emojis = ['😊', '😊', '😢', '😢', '😡', '😡', '😮', '😮'];
        let shuffled = emojis.sort(() => 0.5 - Math.random());
        let selected = [];
        const grid = document.getElementById('grid');

        shuffled.forEach((emoji, index) => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.dataset.emoji = emoji;
            card.innerHTML = emoji;
            card.onclick = () => {
                if (selected.length < 2 && !card.classList.contains('flipped')) {
                    card.classList.add('flipped');
                    selected.push(card);
                    if (selected.length === 2) {
                        if (selected[0].dataset.emoji === selected[1].dataset.emoji) {
                            selected.forEach(c => c.classList.add('matched'));
                            selected = [];
                        } else {
                            setTimeout(() => {
                                selected.forEach(c => c.classList.remove('flipped'));
                                selected = [];
                            }, 1000);
                        }
                    }
                }
            };
            grid.appendChild(card);
        });
    </script>
</body>
</html>
