<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特教輔助遊戲中心 · 全部置中</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>🌟 遊戲中心</h1>
        <p>選擇一個你喜歡的遊戲開始探索吧！</p>
    </header>

    <main class="game-container">
        <a href="game1.html" class="game-card card-blue" onmouseover="speak('情緒翻翻樂')">
            <div class="icon">🃏</div>
            <h2>情緒翻翻樂</h2>
            <p>觀察表情，尋找配對</p>
            <span class="btn">點擊開始</span>
        </a>

        <a href="game2.html" class="game-card card-green" onmouseover="speak('抓住小動物')">
            <div class="icon">🎯</div>
            <h2>抓住小動物</h2>
            <p>訓練專注，快速點擊</p>
            <span class="btn">點擊開始</span>
        </a>
        
        <br> 

        <a href="game3.html" class="game-card card-orange" onmouseover="speak('詞彙對對碰')">
            <div class="icon">📦</div>
            <h2>詞彙對對碰</h2>
            <p>拖動圖片，學習新詞</p>
            <span class="btn">點擊開始</span>
        </a>

        <a href="game4.html" class="game-card card-orange" onmouseover="speak('2048合成')">
            <div class="icon">🧩</div>  
            <h2>2048合成</h2>
            <p>數字合成，考驗腦力</p>
            <span class="btn">點擊開始</span>
        </a>

        <a href="typing_game.html" class="game-card card-purple" onmouseover="speak('趣味打字遊戲')">
            <div class="icon">⌨️</div>
            <h2>趣味打字</h2>
            <p>熟悉鍵盤，提升速度</p>
            <span class="btn">點擊開始</span>
        </a>
    </main>

    <script>
        // 語音輔助功能：當鼠標劃過或點擊時讀出遊戲名 (特教友好)
        function speak(text) {
            // 防止短時間內多次觸發導致聲音混亂
            if (window.speechSynthesis.speaking) {
                window.speechSynthesis.cancel();
            }
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'zh-CN';
            msg.rate = 0.8; // 語速稍慢一點，方便聽清
            msg.volume = 1;
            // 再次確保停止之前的播放
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(msg);
        }
    </script>

</body>
</html>
